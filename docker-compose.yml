name: grades-tracker-app

services:
  tracker-frontend:
    restart: unless-stopped
    build: ./frontend/
    ports:
      - 80:80
    volumes:
      - type: bind
        source: ./frontend/grades-tracker.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    networks:
      - tracker-network
    depends_on:
      - tracker-backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  tracker-backend:
    restart: on-failure:5
    build: ./backend/
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    networks:
      - tracker-network
    depends_on:
      - tracker-db
    healthcheck:
      test: ["CMD", "node", "-e", "\"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
      start_interval: 5s
  
  tracker-db:
    restart: no
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database/:/docker-entrypoint-initdb.d/
      - grades_tracker_database:/var/lib/postgresql/data
    networks:
      - tracker-network

networks:
  tracker-network:
    driver: bridge
    
volumes:
  grades_tracker_database:
